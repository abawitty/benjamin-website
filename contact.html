<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Addo Benjamin Armah</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav id="navbar" class="scrolled">
    <div class="nav-container">
      <a class="nav-logo" href="index.html"><img src="images/ben_logo.png" alt="ABA Logo" class="nav-logo-img" /></a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="about.html">About</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="media.html">Media</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="container">
      <p class="section-label">Let's Connect</p>
      <h1>Get in Touch</h1>
    </div>
  </div>

  <!-- CONTACT CONTENT -->
  <section class="section section-dark">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info" id="contactRoot">
          <p class="contact-intro" id="contactIntro"></p>
          <div class="contact-items" id="contactItems"></div>

          <div class="memberships">
            <h4>Memberships</h4>
            <ul id="contactMemberships"></ul>
          </div>
        </div>

        <form class="contact-form" id="contactForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="How can I help?" required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Your message..." required></textarea>
          </div>
          <button type="submit" class="btn-primary btn-full">Send Message</button>
          <p class="form-note" id="formNote"></p>
        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p class="footer-name">Addo Benjamin Armah</p>
      <p class="footer-tagline">Law · Leadership · Development</p>
      <p class="footer-copy">&copy; 2026 Addo Benjamin Armah. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="render.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addo Benjamin Armah — Legal &amp; Governance Advisory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,450;0,9..144,600;1,9..144,450&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1B2D;
    --ink-soft:#182A44;
    --paper:#F3EFE4;
    --paper-dim:#E7E1D2;
    --gold:#B98F3D;
    --gold-soft:#D8B872;
    --clay:#9A4B36;
    --line:rgba(243,239,228,0.14);
    --line-dark:rgba(15,27,45,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }
  a{color:inherit;text-decoration:none;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold-soft);
  }
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:450;letter-spacing:-0.01em;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 32px;}

  /* ---------- NAV ---------- */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    background:rgba(15,27,45,0.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:64px;}
  .brandmark{display:flex;align-items:center;gap:10px;}
  .brandmark img{height:28px;width:auto;}
  .brandmark span{font-family:'Fraunces',serif;font-size:16px;letter-spacing:0.02em;}
  .navlinks{display:flex;gap:28px;font-size:13.5px;align-items:center;}
  .navlinks a{opacity:0.7;transition:opacity .2s;}
  .navlinks a:hover, .navlinks a:focus-visible{opacity:1;}
  .navlinks a:focus-visible{outline:1px solid var(--gold-soft);outline-offset:4px;}
  .nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;}
  .nav-toggle span{display:block;width:22px;height:2px;background:var(--paper);transition:transform .2s ease, opacity .2s ease;}
  @media (max-width:720px){
    .nav-toggle{display:flex;}
    .navlinks{
      display:none;position:absolute;top:64px;left:0;right:0;
      flex-direction:column;gap:0;background:var(--ink-soft);
      border-bottom:1px solid var(--line);
    }
    .navlinks.open{display:flex;}
    .navlinks a{padding:16px 32px;border-top:1px solid var(--line);opacity:1;}
  }

  /* ---------- HERO ---------- */
  header.hero{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:center;
    padding-top:64px;
    overflow:hidden;
  }
  .hero-bg-lines{
    position:absolute;inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px);
    background-size:100% 88px;
    opacity:0.5;
    mask-image:linear-gradient(to bottom, transparent, black 15%, black 75%, transparent);
  }
  .hero-inner{position:relative;z-index:2;width:100%;}
  .seal{width:88px;height:88px;margin-bottom:36px;opacity:0;animation:rise .8s ease forwards .1s;}
  .hero h1{
    font-size:clamp(42px, 7vw, 78px);
    line-height:1.02;
    max-width:920px;
    opacity:0;animation:rise .8s ease forwards .25s;
  }
  .hero h1 em{
    font-style:italic;
    color:var(--gold-soft);
    font-weight:450;
  }
  .hero .lede{
    margin-top:26px;
    max-width:560px;
    font-size:17px;
    color:rgba(243,239,228,0.72);
    opacity:0;animation:rise .8s ease forwards .4s;
    text-align:justify;hyphens:auto;
  }
  .tags{display:flex;flex-wrap:wrap;gap:10px;margin-top:32px;opacity:0;animation:rise .8s ease forwards .55s;}
  .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:0.05em;
    padding:7px 13px;
    border:1px solid var(--line);
    border-radius:999px;
    color:rgba(243,239,228,0.78);
  }
  .hero-cta{margin-top:40px;display:flex;gap:16px;flex-wrap:wrap;opacity:0;animation:rise .8s ease forwards .7s;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:13px 22px;
    font-size:14px;font-weight:500;
    border-radius:2px;
    transition:transform .2s ease, background .2s ease, border-color .2s ease;
  }
  .btn-primary{background:var(--gold-soft);color:var(--ink);}
  .btn-primary:hover{transform:translateY(-1px);background:var(--gold);}
  .btn-ghost{border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--gold-soft);}
  .btn:focus-visible{outline:2px solid var(--gold-soft);outline-offset:2px;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  section{padding:120px 0;}
  .section-head{margin-bottom:56px;max-width:640px;}
  .section-head .eyebrow{display:block;margin-bottom:14px;}
  .section-head h2{font-size:clamp(28px,3.6vw,40px);}

  /* ---------- ABOUT ---------- */
  #about{border-top:1px solid var(--line);}
  .about-grid{display:grid;grid-template-columns:0.85fr 1.15fr;gap:64px;align-items:start;}
  .portrait{
    aspect-ratio:4/5;
    border-radius:2px;
    background:
      radial-gradient(circle at 30% 20%, rgba(184,143,61,0.35), transparent 55%),
      linear-gradient(160deg, var(--ink-soft), var(--ink) 70%);
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .portrait img{width:100%;height:100%;object-fit:cover;}
  .portrait span{
    font-family:'Fraunces',serif;font-size:15px;color:rgba(243,239,228,0.4);
    text-align:center;padding:0 24px;
  }
  .about-body p{color:rgba(243,239,228,0.78);font-size:16px;margin-bottom:18px;max-width:52ch;text-align:justify;hyphens:auto;}
  .about-body p:first-child{font-size:19px;color:var(--paper);}
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:40px;border-top:1px solid var(--line);padding-top:28px;}
  .stat b{display:block;font-family:'Fraunces',serif;font-size:30px;color:var(--gold-soft);}
  .stat span{font-size:12.5px;color:rgba(243,239,228,0.6);}
  @media (max-width:820px){.about-grid{grid-template-columns:1fr;}.portrait{max-width:280px;}}

  /* ---------- PRACTICE AREAS ---------- */
  #practice{background:var(--ink-soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);}
  .card{background:var(--ink-soft);padding:38px 30px;transition:background .25s ease;}
  .card:hover{background:#1E3252;}
  .card .eyebrow{color:var(--clay);}
  .card h3{font-size:21px;margin:14px 0 12px;}
  .card p{color:rgba(243,239,228,0.68);font-size:14.5px;text-align:justify;hyphens:auto;}
  @media (max-width:820px){.cards{grid-template-columns:1fr;}}

  /* ---------- EXPERIENCE ---------- */
  .exp-cluster{margin-bottom:56px;}
  .exp-cluster:last-child{margin-bottom:0;}
  .exp-cluster .eyebrow{margin-bottom:20px;display:block;}
  .exp-row{
    display:grid;grid-template-columns:1fr 2.2fr;gap:24px;
    padding:22px 0;border-top:1px solid var(--line);
  }
  .exp-cluster .exp-row:last-child{border-bottom:1px solid var(--line);}
  .exp-org{font-family:'Fraunces',serif;font-size:17px;}
  .exp-date{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:rgba(243,239,228,0.5);margin-top:6px;}
  .exp-role{font-size:14.5px;color:var(--gold-soft);margin-bottom:6px;}
  .exp-desc{font-size:14.5px;color:rgba(243,239,228,0.68);max-width:56ch;text-align:justify;hyphens:auto;}
  @media (max-width:640px){.exp-row{grid-template-columns:1fr;gap:8px;}}

  /* ---------- LEGAL TREE (flipped section) ---------- */
  #legaltree{
    background:var(--paper);
    color:var(--ink);
    border-bottom:1px solid var(--line-dark);
  }
  #legaltree .eyebrow{color:var(--clay);}
  .lt-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:64px;align-items:center;}
  #legaltree h2{color:var(--ink);}
  #legaltree p{color:rgba(15,27,45,0.72);font-size:16px;margin-bottom:16px;max-width:54ch;text-align:justify;hyphens:auto;}
  .lt-panel{
    background:var(--ink);
    color:var(--paper);
    padding:38px;
    border-radius:2px;
    position:relative;
  }
  .lt-panel .seal{width:44px;height:44px;margin-bottom:20px;animation:none;opacity:1;}
  .lt-panel h3{font-size:20px;margin-bottom:10px;}
  .lt-panel p{color:rgba(243,239,228,0.7);font-size:14.5px;text-align:justify;hyphens:auto;}
  .lt-cta{margin-top:24px;display:inline-block;font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--gold-soft);border-bottom:1px solid var(--gold-soft);padding-bottom:2px;}
  @media (max-width:820px){.lt-grid{grid-template-columns:1fr;}}

  /* ---------- CREDENTIALS ---------- */
  #credentials{border-bottom:1px solid var(--line);}
  .cred-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line);}
  .cred{background:var(--ink);padding:28px 30px;}
  .cred-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .cred h4{font-family:'Fraunces',serif;font-size:17px;}
  .cred-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(243,239,228,0.5);white-space:nowrap;}
  .cred p{font-size:13.5px;color:rgba(243,239,228,0.62);margin-top:8px;text-align:justify;hyphens:auto;}
  .cred a{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--gold-soft);margin-top:12px;display:inline-block;border-bottom:1px solid rgba(184,143,61,0.4);}
  @media (max-width:640px){.cred-grid{grid-template-columns:1fr;}}

  /* ---------- CONTACT / FOOTER ---------- */
  footer{padding:110px 0 48px;}
  .contact-head h2{font-size:clamp(32px,5vw,52px);max-width:640px;}
  .contact-head .eyebrow{display:block;margin-bottom:14px;}
  .contact-links{display:flex;flex-wrap:wrap;gap:16px;margin-top:40px;}
  .contact-links a{
    font-size:14px;padding:12px 20px;border:1px solid var(--line);border-radius:999px;
    transition:border-color .2s ease, color .2s ease;
  }
  .contact-links a:hover{border-color:var(--gold-soft);color:var(--gold-soft);}
  .foot-bottom{
    margin-top:96px;padding-top:24px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
    font-size:12.5px;color:rgba(243,239,228,0.45);
  }
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <div class="brandmark">
      <img src="" alt="ABA monogram" id="navLogo">
      <span>Addo Benjamin Armah</span>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="navlinks" id="navLinks">
      <a href="#about">About</a>
      <a href="#practice">Practice</a>
      <a href="#experience">Experience</a>
      <a href="#legaltree">Legal Tree</a>
      <a href="#credentials">Credentials</a>
      <a href="media.html">Media</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="hero-bg-lines"></div>
  <div class="wrap hero-inner">
    <img class="seal" src="" alt="ABA monogram — quill and inkwell" id="heroSeal">
    <h1 id="heroHeading"></h1>
    <p class="lede" id="heroLede"></p>
    <div class="tags" id="heroTags"></div>
    <div class="hero-cta">
      <a class="btn btn-primary" href="#contact" id="heroCtaPrimary"></a>
      <a class="btn btn-ghost" href="#experience" id="heroCtaSecondary"></a>
    </div>
  </div>
</header>

<section id="about">
  <div class="wrap">
    <div class="about-grid">
      <div class="portrait" id="aboutPortrait"><span>Portrait photograph<br>(replace placeholder)</span></div>
      <div class="about-body">
        <div id="aboutParagraphs"></div>
        <div class="stat-row" id="aboutStats"></div>
      </div>
    </div>
  </div>
</section>

<section id="practice">
  <div class="wrap">
    <div class="section-head">
      <span class="eyebrow" id="practiceEyebrow"></span>
      <h2 id="practiceHeading"></h2>
    </div>
  </div>
  <div class="cards" id="practiceCards"></div>
</section>

<section id="experience">
  <div class="wrap">
    <div class="section-head">
      <span class="eyebrow" id="experienceEyebrow"></span>
      <h2 id="experienceHeading"></h2>
    </div>

    <div id="experienceClusters"></div>
  </div>
</section>

<section id="legaltree">
  <div class="wrap">
    <div class="lt-grid">
      <div>
        <span class="eyebrow" id="ltEyebrow"></span>
        <h2 id="ltHeading"></h2>
        <div id="ltParagraphs"></div>
      </div>
      <div class="lt-panel">
        <img class="seal" src="" alt="ABA monogram" id="ltSeal">
        <h3 id="ltPanelHeading"></h3>
        <p id="ltPanelText"></p>
        <a class="lt-cta" href="#contact" id="ltCta"></a>
      </div>
    </div>
  </div>
</section>

<section id="credentials">
  <div class="wrap">
    <div class="section-head">
      <span class="eyebrow" id="credEyebrow"></span>
      <h2 id="credHeading"></h2>
    </div>
  </div>
  <div class="cred-grid" id="credGrid"></div>
</section>

<footer id="contact">
  <div class="wrap">
    <div class="contact-head">
      <span class="eyebrow" id="footerEyebrow"></span>
      <h2 id="footerHeading"></h2>
    </div>
    <div class="contact-links" id="contactLinks"></div>
    <div class="foot-bottom">
      <span id="footerCopyright"></span>
      <span id="footerTagline"></span>
    </div>
  </div>
</footer>

<script src="script.js"></script>
<script src="render.js"></script>
</body>
</html>

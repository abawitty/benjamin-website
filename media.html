<head>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav id="navbar" class="scrolled">
    <div class="nav-container">
      <a class="nav-logo" href="index.html"><img src="images/ben_logo.png" alt="ABA Logo" class="nav-logo-img" /></a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="about.html">About</a></li>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="container">
      <p class="section-label">In Pictures</p>
      <h1>Media Gallery</h1>
    </div>
  </div>

  <!-- GALLERY CONTENT -->
  <section class="section">
    <div class="container">

      <div class="album-nav" id="albumNav"></div>

      <div id="galleryRoot"></div>
    </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lb-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
    <button class="lb-next" id="lbNext" aria-label="Next">&#8250;</button>
    <div class="lb-inner">
      <img id="lbImg" src="" alt="" />
      <p id="lbCaption"></p>
    </div>
  </div>

  <footer>
    <div class="container">
      <p class="footer-name">Addo Benjamin Armah</p>
